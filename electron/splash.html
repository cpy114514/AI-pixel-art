<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Pixel Art</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        overflow: hidden;
        background:
          linear-gradient(135deg, rgba(8, 17, 31, 0.94), rgba(15, 23, 42, 0.98)),
          repeating-linear-gradient(
            0deg,
            rgba(255, 255, 255, 0.04) 0,
            rgba(255, 255, 255, 0.04) 1px,
            transparent 1px,
            transparent 12px
          ),
          repeating-linear-gradient(
            90deg,
            rgba(255, 255, 255, 0.04) 0,
            rgba(255, 255, 255, 0.04) 1px,
            transparent 1px,
            transparent 12px
          );
        color: #e5f6ff;
        font-family:
          Inter,
          "Segoe UI",
          system-ui,
          sans-serif;
      }

      .shell {
        width: 340px;
        text-align: center;
      }

      .pixels {
        width: 112px;
        height: 112px;
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        margin: 0 auto 24px;
      }

      .pixel {
        width: 22px;
        height: 22px;
        background: #22d3ee;
        box-shadow: 0 0 18px rgba(34, 211, 238, 0.55);
        animation: pulse 1.1s infinite ease-in-out;
      }

      .pixel:nth-child(2),
      .pixel:nth-child(7),
      .pixel:nth-child(12) {
        background: #facc15;
        animation-delay: 0.12s;
      }

      .pixel:nth-child(4),
      .pixel:nth-child(9),
      .pixel:nth-child(14) {
        background: #fb7185;
        animation-delay: 0.24s;
      }

      .pixel:nth-child(6),
      .pixel:nth-child(11),
      .pixel:nth-child(16) {
        background: #a78bfa;
        animation-delay: 0.36s;
      }

      h1 {
        margin: 0;
        font-size: 28px;
        font-weight: 900;
        letter-spacing: 0;
      }

      .status {
        margin-top: 12px;
        min-height: 20px;
        color: #93c5fd;
        font-size: 13px;
        font-weight: 700;
      }

      body[data-error] .status::before {
        content: attr(data-error);
        color: #fda4af;
      }

      body:not([data-error]) .status::before {
        content: "Starting local canvas engine...";
      }

      .bar {
        height: 8px;
        margin-top: 22px;
        overflow: hidden;
        border: 1px solid rgba(148, 163, 184, 0.4);
        background: rgba(15, 23, 42, 0.9);
      }

      .bar::after {
        content: "";
        display: block;
        width: 40%;
        height: 100%;
        background: linear-gradient(90deg, #22d3ee, #facc15, #fb7185);
        animation: load 1.2s infinite linear;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: translateY(0) scale(1);
          opacity: 0.45;
        }

        50% {
          transform: translateY(-8px) scale(1.05);
          opacity: 1;
        }
      }

      @keyframes load {
        0% {
          transform: translateX(-110%);
        }

        100% {
          transform: translateX(260%);
        }
      }
    </style>
  </head>
  <body>
    <main class="shell" aria-label="AI Pixel Art is starting">
      <div class="pixels" aria-hidden="true">
        <span class="pixel"></span>
        <span class="pixel"></span>
        <span class="pixel"></span>
        <span class="pixel"></span>
        <span class="pixel"></span>
        <span class="pixel"></span>
        <span class="pixel"></span>
        <span class="pixel"></span>
        <span class="pixel"></span>
        <span class="pixel"></span>
        <span class="pixel"></span>
        <span class="pixel"></span>
        <span class="pixel"></span>
        <span class="pixel"></span>
        <span class="pixel"></span>
        <span class="pixel"></span>
      </div>
      <h1>AI Pixel Art</h1>
      <div class="status"></div>
      <div class="bar" aria-hidden="true"></div>
    </main>
  </body>
</html>
